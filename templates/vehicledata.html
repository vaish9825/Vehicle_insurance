<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Insurance Predictor</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="page-container">

    <div class="hero">

        <div class="header-row">
            <h1>Vehicle Insurance Predictor</h1>

            <button type="button" id="themeToggle" class="theme-btn">
                🌙 Dark Mode
            </button>
        </div>

        <p>
            Predict whether a customer is likely to purchase vehicle insurance
            using a machine learning model deployed on AWS.
        </p>

    </div>

    <div class="card">

        <form method="post" action="/">

            <div class="grid">

                <div>
                    <label>Gender</label>
                    <select name="Gender" required>
                        <option value="1">Male</option>
                        <option value="0">Female</option>
                    </select>
                </div>

                <div>
                    <label>Age</label>
                    <input type="number" name="Age" placeholder="e.g. 35" required>
                </div>

                <div>
                    <label>Driving License</label>
                    <select name="Driving_License" required>
                        <option value="1">Yes</option>
                        <option value="0">No</option>
                    </select>
                </div>

                <div>
                    <label>Region Code</label>
                    <input type="number" step="0.01" name="Region_Code" placeholder="e.g. 28" required>
                </div>

                <div>
                    <label>Previously Insured</label>
                    <select name="Previously_Insured" required>
                        <option value="1">Yes</option>
                        <option value="0">No</option>
                    </select>
                </div>

                <div>
                    <label>Annual Premium</label>
                    <input type="number" step="0.01" name="Annual_Premium" placeholder="e.g. 40454" required>
                </div>

                <div>
                    <label>Policy Sales Channel</label>
                    <input type="number" step="0.01" name="Policy_Sales_Channel" placeholder="e.g. 26" required>
                </div>

                <div>
                    <label>Vintage</label>
                    <input type="number" name="Vintage" placeholder="e.g. 217" required>
                </div>

                <div>
                    <label>Vehicle Age &lt; 1 Year</label>
                    <select name="Vehicle_Age_lt_1_Year" required>
                        <option value="1">Yes</option>
                        <option value="0">No</option>
                    </select>
                </div>

                <div>
                    <label>Vehicle Age &gt; 2 Years</label>
                    <select name="Vehicle_Age_gt_2_Years" required>
                        <option value="1">Yes</option>
                        <option value="0">No</option>
                    </select>
                </div>

                <div class="full-width">
                    <label>Vehicle Previously Damaged</label>
                    <select name="Vehicle_Damage_Yes" required>
                        <option value="1">Yes</option>
                        <option value="0">No</option>
                    </select>
                </div>

            </div>

            <button class="predict-btn" type="submit">
                Predict Insurance Interest
            </button>

        </form>

        {% if context and context != "Rendering" %}
        <div class="result-card {% if context == 'Response-Yes' %}yes{% else %}no{% endif %}">
            <h2>Prediction Result: {{ context }}</h2>
        </div>
        {% endif %}

    </div>

    <footer>
        <p>Made with ❤️ by Vaishavi Waghmare</p>
    </footer>

</div>

<script>
const btn = document.getElementById("themeToggle");

btn.addEventListener("click", () => {
    document.body.classList.toggle("dark-mode");

    if(document.body.classList.contains("dark-mode")){
        btn.innerHTML = "☀️ Light Mode";
    } else {
        btn.innerHTML = "🌙 Dark Mode";
    }
});
</script>

</body>
</html>
