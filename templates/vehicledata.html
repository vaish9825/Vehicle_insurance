<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Insurance Predictor</title>

```
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
```

</head>

<body>

<div class="container py-5">

```
<div class="text-center mb-4">
    <h1 class="display-5 fw-bold">🚗 Vehicle Insurance Predictor</h1>
    <p class="lead">
        Predict whether a customer is likely to purchase vehicle insurance using a machine learning model deployed on AWS.
    </p>
</div>

<div class="card shadow-lg border-0">
    <div class="card-body p-4">

        <form method="post" action="/">

            <div class="row">

                <div class="col-md-6 mb-3">
                    <label class="form-label">Gender</label>
                    <select class="form-select" name="Gender">
                        <option value="1">Male</option>
                        <option value="0">Female</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Age</label>
                    <input class="form-control" type="number" name="Age" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Driving License</label>
                    <select class="form-select" name="Driving_License">
                        <option value="1">Yes</option>
                        <option value="0">No</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Region Code</label>
                    <input class="form-control" type="number" step="0.01" name="Region_Code" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Previously Insured</label>
                    <select class="form-select" name="Previously_Insured">
                        <option value="1">Yes</option>
                        <option value="0">No</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Annual Premium</label>
                    <input class="form-control" type="number" step="0.01" name="Annual_Premium" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Policy Sales Channel</label>
                    <input class="form-control" type="number" step="0.01" name="Policy_Sales_Channel" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Vintage</label>
                    <input class="form-control" type="number" name="Vintage" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Vehicle Age &lt; 1 Year</label>
                    <select class="form-select" name="Vehicle_Age_lt_1_Year">
                        <option value="1">Yes</option>
                        <option value="0">No</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Vehicle Age &gt; 2 Years</label>
                    <select class="form-select" name="Vehicle_Age_gt_2_Years">
                        <option value="1">Yes</option>
                        <option value="0">No</option>
                    </select>
                </div>

                <div class="col-md-12 mb-3">
                    <label class="form-label">Vehicle Previously Damaged</label>
                    <select class="form-select" name="Vehicle_Damage_Yes">
                        <option value="1">Yes</option>
                        <option value="0">No</option>
                    </select>
                </div>

            </div>

            <div class="d-grid mt-3">
                <button class="btn btn-primary btn-lg" type="submit">
                    Predict Insurance Interest
                </button>
            </div>

        </form>

        <form method="get" action="/train" class="mt-3">
            <div class="d-grid">
                <button type="submit" class="btn btn-success">
                    Retrain Model
                </button>
            </div>
        </form>

        {% if context %}
        <div class="alert alert-info mt-4 text-center">
            <h4 class="mb-0">
                Prediction Result: {{ context }}
            </h4>
        </div>
        {% endif %}

    </div>
</div>

<div class="text-center mt-4">
    <span class="badge bg-dark">FastAPI</span>
    <span class="badge bg-primary">AWS EC2</span>
    <span class="badge bg-success">MongoDB Atlas</span>
    <span class="badge bg-warning text-dark">Docker</span>
    <span class="badge bg-danger">GitHub Actions</span>
</div>
```

</div>

</body>
</html>
